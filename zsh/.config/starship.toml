[os]
#format = "[($symbol $version)]($style)"
format = "$symbol($style)"
style = "purple"
disabled = false

[username]
style_user = "bold #50fa7b" # Dracula green
style_root = "bold #ff5555" # Dracula red
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname](bold #bd93f9) ' # Dracula purple
trim_at = "."
disabled = false

# Replace the "ÔØ»" symbol in the prompt with "Ô×£" and uses Dracula colors
[character]                          
error_symbol = "[Ô£ù](bold #ff5555)" # Dracula red
success_symbol = "[Ô×£](bold #50fa7b)" # Draci;a green

# configure directory
[directory]
read_only = " ´á¢"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic #6272a4" # Dracula indigo

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
#style = "bold italic red"
style = "bold italic #ff5555" # Dracula red

[docker_context]
symbol = "´îê "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[git_branch]
style = "bold #ff79c6" # Dracula theme

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)"
modified = "[${count}+](yellow)"
deleted =  "[${count}-](red)"
conflicted =  "[${count}~](red)"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
untracked = "[${count}?](blue)"
staged = "[${count}+](green)"
style = "bold #ff5555" # Dracula theme

[git_state]
style =  "bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"
revert = "revert"
cherry_pick = "cherry"
bisect = "bisect"
am = "am"
am_or_rebase = "am/rebase"

[python]
symbol = "­ƒÉì "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

