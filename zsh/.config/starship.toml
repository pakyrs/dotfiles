#format = """
#[тХнтФАuserтФАтФАтФАтЭп](bold blue) $username
#[тФгтФАsystemтФАтЭп](bold yellow) $hostname
#[тФгтФАprojectтЭп](bold red) $directory$rust$git_branch$git_state$git_status$package$golang$terraform$docker_context$python$docker_context$nodejs
#[тХ░тФАcmdтФАтФАтФАтФАтЭп](bold green)
#"""
[username]
style_user = "green bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = false
format = 'on [$hostname](bold purple) '
trim_at = "."
disabled = false

# Replace the "тЭп" symbol in the prompt with "тЮЬ"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[тЮЬ](bold green)"     # The "success_symbol" segment is being set to "тЮЬ" with the color "bold green"
error_symbol = "[тЬЧ](bold red)"

# яФ╢ яФ┤
# configure directory
[directory]
read_only = " яа╜"
truncation_length = 10
truncate_to_repo = true # truncates directory to root folder if in github repo
style = "bold italic blue"

[cmd_duration]
min_time = 4
show_milliseconds = false
disabled = false
style = "bold italic red"

[aws]
symbol = "юМ╜  "

[conda]
symbol = "яДМ "

[dart]
symbol = "юЮШ "

#[directory]
#read_only = " яа╜"

[docker_context]
symbol = "яМИ "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[elixir]
symbol = "юЙ╡ "

[elm]
symbol = "юШм "

[git_branch]
symbol = "яРШ "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
stashed = "[${count}*](green)" 
modified = "[${count}+](yellow)" 
deleted =  "[${count}-](red)" 
conflicted =  "[${count}~](red)" 
ahead = "тЗб${count}"
behind = "тЗг${count}"
untracked = "[${count}?](blue)" 
staged = "[${count}+](green)" 

[git_state]
style =	"bold red"
format = "[$state( $progress_current/$progress_total) ]($style)"
rebase = "rebase"
merge = "merge"	
revert = "revert"	
cherry_pick = "cherry"
bisect = "bisect"	
am = "am"	
am_or_rebase = "am/rebase"

[golang]
symbol = "юШз "

[hg_branch]
symbol = "яРШ "

[java]
symbol = "юЙЦ "

[julia]
symbol = "юШд "

[haskell]
symbol = "╬╗ "

[memory_usage]
symbol = "ябЪ "

[nim]
symbol = "яЪд "

[nix_shell]
symbol = "яЛЬ "

[package]
symbol = "ягЦ "

[perl]
symbol = "юЭй "

[php]
symbol = "юШИ "

[python]
symbol = "ЁЯРН "
#pyenv_version_name = true
format = 'via [${symbol}python (${version} )(\($virtualenv\) )]($style)'
style = "bold yellow"
pyenv_prefix = "venv "
python_binary = ["./venv/bin/python", "python", "python3", "python2"]
detect_extensions = ["py"]
version_format = "v${raw}"

[ruby]
symbol = "юИ╛ "

[rust]
symbol = "юЮи "

[scala]
symbol = "юЬ╖ "

[shlvl]
symbol = "яДа "

[swift]
symbol = "япг "

[nodejs]
format = "via [явШ Node.js $version](bold green) "
detect_files = ["package.json", ".node-version"]
detect_folders = ["node_modules"]

